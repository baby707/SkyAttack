<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="SkyAttack private pilot knowledge quiz."
    />

    <title>SkyAttack | Pilot Quiz</title>

    <link rel="icon" type="image/png" href="../images/favicon.jpg" />

    <link rel="stylesheet" href="../style.css" />
  </head>

  <body>
    <header class="header">
      <div class="container nav-container">
        <a href="../index.html" class="logo"> SkyAttack </a>

        <nav class="nav" aria-label="Main navigation">
          <ul class="nav-list">
            <li>
              <a href="../index.html"> Home </a>
            </li>

            <li>
              <a href="aircraft.html"> Aircraft </a>
            </li>

            <li>
              <a href="flashcards.html"> Flashcards </a>
            </li>

            <li>
              <a href="quiz.html"> Quiz </a>
            </li>

            <li>
              <a href="vspeeds.html"> V-Speeds </a>
            </li>

            <li>
              <a href="weightbalance.html"> Weight & Balance </a>
            </li>

            <li>
              <a href="flightplanner.html"> Flight Planner </a>
            </li>
          </ul>
        </nav>

        <button
          class="menu-button"
          aria-label="Open navigation menu"
          aria-expanded="false"
        >
          ☰
        </button>
      </div>
    </header>

    <main>
      <section class="quiz-section">
        <div class="container">
          <h1>Private Pilot Quiz</h1>

          <p>Test your aviation knowledge and improve your pilot skills.</p>

          <!-- QUIZ DIFFICULTY -->

          <div class="quiz-controls">
            <label for="difficulty"> Choose Difficulty </label>

            <select id="difficulty" aria-label="Choose quiz difficulty">
              <option value="student">Student Pilot</option>

              <option value="private">Private Pilot</option>

              <option value="instrument">Instrument Pilot</option>
            </select>
          </div>

          <div class="quiz-card" id="quiz-card">
            <h2 id="quiz-question">Question goes here</h2>

            <div class="quiz-options" id="quiz-options"></div>

            <p id="quiz-feedback"></p>

            <button class="btn" id="next-question">Next Question</button>

            <h3 id="quiz-score">Score: 0</h3>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <p>© 2026 SkyAttack. All rights reserved.</p>
      </div>
    </footer>

    <script src="../script.js"></script>
  </body>
</html>
